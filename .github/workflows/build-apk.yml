name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: mobile
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Sync web sources -> mobile/www
        working-directory: mobile
        run: npm run sync:web

      - name: Add Android platform (npx cap add android)
        working-directory: mobile
        run: npx cap add android

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync android

      - name: Patch AndroidManifest with Bluetooth 12+ permissions
        working-directory: mobile/android/app/src/main
        run: |
          python3 << 'PYEOF'
          with open('AndroidManifest.xml', 'r', encoding='utf-8') as f:
              content = f.read()
          perms = [
              '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" tools:targetApi="s" />',
              '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
          ]
          if 'xmlns:tools' not in content:
              content = content.replace(
                  '<manifest ',
                  '<manifest xmlns:tools="http://schemas.android.com/tools" ',
                  1
              )
          for p in perms:
              if p not in content:
                  content = content.replace('<application', p + '\n    <application', 1)
          with open('AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(content)
          print('Manifest patched with BT 12+ permissions')
          PYEOF

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk artifacts/salvallanta-debug.apk
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: salvallanta-apk
          path: artifacts/salvallanta-debug.apk
          if-no-files-found: error
          retention-days: 30

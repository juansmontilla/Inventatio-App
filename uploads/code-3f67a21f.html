<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top AppBar (Simplified for Login) -->
<header class="bg-surface border-b border-outline-variant flex justify-center items-center w-full px-container-padding h-input-height fixed top-0 z-50">
<h1 class="font-headline-md text-headline-md-mobile text-primary">Salvallanta</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-container-padding py-24">
<div class="w-full max-w-md space-y-form-stack">
<!-- Logo Section based on Sketch -->
<div class="flex flex-col items-center justify-center space-y-4">
<div class="w-24 h-24 bg-surface-container-high rounded-xl flex items-center justify-center border border-outline-variant shadow-sm overflow-hidden">
<!-- This represents the 'Logo' placeholder from the sketch -->
<img alt="Salvallanta Industrial Logo" class="w-full h-full object-cover opacity-90" data-alt="A professional and sleek industrial logo featuring abstract automotive wheel shapes and a tire tread pattern. The visual style is minimalist and corporate, utilizing deep charcoal blue and metallic silver tones. The lighting is clean and high-key, set against a pristine white background to maintain a modern light-mode aesthetic that communicates reliability and sturdiness." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDoP7oL0snJY6Ule49ZLW9d5wYMYg3nJ7gVmDTj7Qe6_uLXMkUWow5TD9PdklFnxtT7znAlk-w1Wv3zqeJLnZcvJ7bVqgcj6IA805PcSCd-L5uy_yX0ismTApjhekyCpVzQi9D_vW12k_SEqRMIhK5uIcZbx7MWRE21D-ETuS1-N9T1KLee_2IO1f_vp14MtFhxhJefjozvJpKJmK5Ry7Fc1ZuvYdz4s6BZ8N-CpQK1pS_gtNSvfa1UgeLMAxJLcWjze7o7C4rQ-c"/>
</div>
<div class="text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Bienvenido</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Inicie sesión para continuar</p>
</div>
</div>
<!-- Login Form -->
<form class="space-y-element-gap">
<!-- Usuario Field -->
<div class="space-y-base">
<label class="block font-label-bold text-label-bold text-on-surface" for="usuario">Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">person</span>
<input class="w-full h-input-height pl-10 pr-4 bg-white border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" id="usuario" name="usuario" placeholder="Ingrese su usuario" type="text"/>
</div>
</div>
<!-- Contraseña Field -->
<div class="space-y-base">
<label class="block font-label-bold text-label-bold text-on-surface" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
<input class="w-full h-input-height pl-10 pr-12 bg-white border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-caption text-caption text-primary hover:underline" href="#">¿Olvidó su contraseña?</a>
</div>
</div>
<!-- Primary Action Button (Grabar equivalent) -->
<div class="pt-base">
<button class="w-full h-input-height bg-primary text-on-primary font-label-bold text-label-bold rounded-lg shadow-sm active:scale-[0.98] transition-all hover:bg-primary-container" type="submit">
                        Ingresar
                    </button>
</div>
</form>
<!-- Bottom Utilities -->
<div class="pt-form-stack text-center">
<p class="font-caption text-caption text-on-surface-variant">
                    ¿No tiene una cuenta? <a class="text-primary font-bold hover:underline" href="#">Solicite acceso</a>
</p>
<div class="mt-element-gap flex items-center justify-center space-x-2">
<span class="h-px w-8 bg-outline-variant"></span>
<span class="font-caption text-caption text-outline">Versión 2.4.0</span>
<span class="h-px w-8 bg-outline-variant"></span>
</div>
</div>
</div>
</main>
<!-- Footer for Visual Balance (No Nav Shell on Login per Mandate) -->
<footer class="p-container-padding text-center">
<p class="font-caption text-caption text-outline">© 2024 Salvallanta S.A. Todos los derechos reservados.</p>
</footer>

<body class="bg-background text-on-background min-h-screen flex flex-col pb-20">
<!-- TopAppBar Component -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-container-padding h-input-height border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low transition-colors rounded-full p-1 active:opacity-70">menu</button>
<h1 class="text-headline-md-mobile font-headline-md font-bold text-primary">Salvallanta</h1>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low transition-colors rounded-full p-1 active:opacity-70">account_circle</button>
</div>
</header>
<main class="flex-1 px-container-padding py-form-stack max-w-lg mx-auto w-full overflow-y-auto no-scrollbar">
<div class="flex flex-col gap-form-stack">
<!-- Header Section with Auto-filled data -->
<section class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Fecha</label>
<div class="h-input-height flex items-center px-4 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface font-input-text text-input-text">
                        12/03/26
                    </div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Código</label>
<div class="h-input-height flex items-center px-4 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface font-input-text text-input-text">
                        1234
                    </div>
</div>
</section>
<!-- Main Form Section -->
<section class="flex flex-col gap-form-stack">
<div class="grid grid-cols-2 gap-element-gap">
<!-- Reference -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">Referencia</label>
<input class="h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" placeholder="Ej. PCR-01" type="text"/>
</div>
<!-- Brand (Marca) -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">Marca</label>
<div class="relative">
<select class="appearance-none w-full h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all bg-white">
<option disabled="" selected="" value="">Seleccionar</option>
<option>Bridgestone</option>
<option>Michelin</option>
<option>Goodyear</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-element-gap">
<!-- Engraving (Grabado) -->
<div class="md:col-span-2 flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">Grabado</label>
<input class="h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" placeholder="Patrón de dibujo" type="text"/>
</div>
<!-- DOT -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">DOT</label>
<input class="h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" placeholder="####" type="text"/>
</div>
</div>
<!-- Quantity (Cantidad) -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">Cantidad</label>
<div class="flex items-center h-input-height border border-outline-variant rounded-lg overflow-hidden max-w-[160px]">
<button class="flex-1 h-full hover:bg-surface-container-low active:bg-surface-container-high transition-colors flex items-center justify-center border-r border-outline-variant">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
<input class="w-12 text-center font-input-text text-input-text bg-transparent border-none focus:ring-0" type="number" value="1"/>
<button class="flex-1 h-full hover:bg-surface-container-low active:bg-surface-container-high transition-colors flex items-center justify-center border-l border-outline-variant">
<span class="material-symbols-outlined text-primary">add</span>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-element-gap">
<!-- Order Number (No Orden) -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">No. Orden</label>
<input class="h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" placeholder="00000" type="text"/>
</div>
<!-- Seller (Vendedor) -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface-variant">Vendedor</label>
<input class="h-input-height px-4 border border-outline-variant rounded-lg font-input-text text-input-text focus:border-primary focus:ring-1 focus:ring-primary/10 outline-none transition-all placeholder:text-outline" placeholder="Nombre" type="text"/>
</div>
</div>
</section>
<!-- Actions Section -->
<section class="flex flex-col gap-4 mt-8">
<button class="w-full h-input-height bg-primary text-on-primary font-label-bold rounded-lg shadow-[0px_2px_4px_rgba(0,0,0,0.1)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Ejecutar
                </button>
<button class="w-full h-input-height bg-transparent text-primary font-label-bold border border-outline rounded-lg hover:bg-surface-container-low active:scale-95 transition-all">
                    Cancelar
                </button>
</section>
<!-- Decorative Visual for context -->
<div class="mt-8 rounded-xl overflow-hidden shadow-sm border border-outline-variant bg-surface">
<img alt="Inventario" class="w-full h-32 object-cover opacity-80 grayscale hover:grayscale-0 transition-all duration-500" data-alt="A clean and professional industrial warehouse setting showing neatly stacked heavy-duty truck tires on metal racks. The lighting is bright and overhead, creating a utilitarian yet organized atmosphere with high-key whites and deep charcoal shadows. The composition focuses on the repeating textures of the tire treads, emphasizing reliability and inventory precision in a modern light-mode aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCIT6wRx93O0Z5zNDJt3KLaKyP5kMlwLG0mwJtdvgFH6GbbMZkLzf34xiPqFs3L4f4vm-iYd2U0pCenZuudIb8mn5YuT8latRWh_uYmnQe418eUgt1B164Vuobfh59KqfNLetIk4ELbbh6NTuk888_YiNRkkRIsJzeu7I2chNjlRZjeOokK9GZd9YIfLqPPnskvH0sudbcBs3bFgsEEDfFfaqlq9fOQJoqJ_6AljIRsOde4drLo6l-y15tSixUVgFJrQC5Akw48zgg"/>
</div>
</div>

<span class="font-caption text-caption">Consultar</span>

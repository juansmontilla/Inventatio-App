<body class="flex flex-col min-h-screen text-on-surface">

<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-container-padding h-input-height fixed top-0 z-50">

<p class="font-body-lg text-body-lg text-on-surface-variant">Bienvenido al sistema de inventario industrial.</p>
</div>
<!-- Bento Grid / Menu Tiles -->

<!-- Tile: Agregar Llantas -->
<div class="bg-white border border-outline-variant rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-surface-container-low transition-all active:scale-95 duration-100 group shadow-sm">
<div class="bg-secondary-container text-on-secondary-container w-16 h-16 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<span class="font-label-bold text-label-bold text-primary uppercase tracking-wider">Agregar Llantas</span>
</div>
<!-- Tile: Consultar Llantas -->
<div class="bg-white border border-outline-variant rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-surface-container-low transition-all active:scale-95 duration-100 group shadow-sm">
<div class="bg-secondary-container text-on-secondary-container w-16 h-16 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="search">search</span>
</div>

</div>

<span class="material-symbols-outlined text-3xl" data-icon="group" data-weight="fill" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<span class="font-label-bold text-label-bold text-primary uppercase tracking-wider">Usuarios</span>
</div>
<!-- Tile: Catálogos -->

<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 flex justify-between items-center px-container-padding h-input-height w-full bg-surface border-b border-outline-variant">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-80 transition-opacity" data-icon="menu">menu</span>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">Salvallanta</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-80 transition-opacity" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="max-w-xl mx-auto px-container-padding py-form-stack">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary" data-icon="add_circle">add_circle</span>
<h2 class="font-headline-md text-headline-md text-primary">Agregar Llantas</h2>
</div>
<form class="space-y-form-stack">
<!-- Row: Fecha y Código -->
<div class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Fecha</label>
<input class="h-input-height px-4 bg-surface-container-low border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:border-primary transition-colors cursor-not-allowed opacity-80" readonly="" type="text" value="24/05/2026"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Código</label>
<input class="h-input-height px-4 bg-surface-container-low border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:border-primary transition-colors cursor-not-allowed opacity-80" readonly="" type="text" value="LLV-0134"/>
</div>
</div>
<!-- Row: Referencia y Marca -->
<div class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Referencia</label>
<input class="h-input-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="ej: 215/45 R17" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Marca</label>
<input class="h-input-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="ej: Michelin" type="text"/>
</div>
</div>
<!-- Row: Grabado y DOT -->
<div class="grid grid-cols-3 gap-element-gap">
<div class="col-span-2 flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Grabado</label>
<input class="h-input-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="ej: TerraMAX AT" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">DOT</label>
<input class="h-input-height px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all" maxlength="4" placeholder="2321" type="text"/>
</div>
</div>
<!-- Row: Cantidad y Tipo -->
<div class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Cantidad</label>
<div class="flex h-input-height items-center bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden">
<button class="flex-1 h-full flex items-center justify-center hover:bg-surface-container transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<input class="w-12 text-center border-none focus:ring-0 font-label-bold text-label-bold bg-transparent" type="number" value="1"/>
<button class="flex-1 h-full flex items-center justify-center hover:bg-surface-container transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Tipo</label>
<div class="relative">
<select class="appearance-none h-input-height w-full px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all">
<option>LT</option>
<option>PCR</option>
<option>TBR</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Row: Estado y Condición -->
<div class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Estado</label>
<div class="relative">
<select class="appearance-none h-input-height w-full px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all">
<option>Usada</option>
<option>Nueva</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Condición</label>
<div class="relative">
<select class="appearance-none h-input-height w-full px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all">
<option>Excelente</option>
<option>Reparada</option>
<option>Garantía</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Row: Ubicación y Propiedad -->
<div class="grid grid-cols-2 gap-element-gap">
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Ubicación</label>
<div class="relative">
<select class="appearance-none h-input-height w-full px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all">
<option>Piso 1</option>
<option>Piso 2</option>
<option>Bodega A</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface">Propiedad</label>
<div class="relative">
<select class="appearance-none h-input-height w-full px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-input-text text-input-text focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all">
<option>Salvallanta</option>
<option>Cliente</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Section: Fotos -->
<div class="space-y-4 pt-4">
<label class="font-headline-md text-headline-md text-primary">Fotos</label>
<div class="grid grid-cols-2 gap-4">
<!-- Photo Slots -->
<div class="aspect-square bg-surface-container border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 text-outline-variant hover:bg-surface-container-high hover:text-outline transition-all cursor-pointer">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera">photo_camera</span>
<span class="font-label-bold text-label-bold">Foto 1</span>
</div>
<div class="aspect-square bg-surface-container border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 text-outline-variant hover:bg-surface-container-high hover:text-outline transition-all cursor-pointer">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera">photo_camera</span>
<span class="font-label-bold text-label-bold">Foto 2</span>
</div>
<div class="aspect-square bg-surface-container border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 text-outline-variant hover:bg-surface-container-high hover:text-outline transition-all cursor-pointer">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera">photo_camera</span>
<span class="font-label-bold text-label-bold">Foto 3</span>
</div>
<div class="aspect-square bg-surface-container border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 text-outline-variant hover:bg-surface-container-high hover:text-outline transition-all cursor-pointer">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera">photo_camera</span>
<span class="font-label-bold text-label-bold">Foto 4</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 pt-8">
<button class="flex-1 h-14 flex items-center justify-center gap-2 border-2 border-outline-variant rounded-xl font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined" data-icon="close">close</span>
                    Cancelar
                </button>
<button class="flex-[2] h-14 flex items-center justify-center gap-2 bg-primary text-on-primary rounded-xl font-label-bold text-label-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-95" type="submit">
<span class="material-symbols-outlined" data-icon="save" data-weight="fill" style="font-variation-settings: 'FILL' 1;">save</span>
                    Grabar
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant flex justify-around items-center py-2">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:text-primary transition-colors cursor-pointer active:scale-95">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-bold text-label-bold">Panel</span>
</div>
<div class="flex flex-col items-center justify-center text-primary bg-secondary-container rounded-xl px-3 py-1 transition-colors cursor-pointer active:scale-95">
<span class="material-symbols-outlined" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-bold text-label-bold">Registrar</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:text-primary transition-colors cursor-pointer active:scale-95">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-bold text-label-bold">Consultar</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:text-primary transition-colors cursor-pointer active:scale-95">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span class="font-label-bold text-label-bold">Venta</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:text-primary transition-colors cursor-pointer active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-bold text-label-bold">Admin</span>
</div>
</nav>
</body></html>
